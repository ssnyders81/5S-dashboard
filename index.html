<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shop 5S Status - Rock Valley</title>
  <style>
    body {
      margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0a0a0a; color: white;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center; padding: 20px 30px;
      background: #1f1f1f; border-bottom: 2px solid #333;
    }
    #clock { font-size: 52px; font-weight: bold; }
    #date { font-size: 22px; color: #aaa; }
    .weather-container { display: flex; gap: 15px; }
    .weather-card {
      background: #2a2a2a; padding: 12px; border-radius: 10px; text-align: center; min-width: 110px;
    }
    .ticker-container {
      flex: 1; overflow: hidden; white-space: nowrap; background: #0a0a0a; padding-top: 20px;
    }
    .ticker {
      display: inline-flex;
      animation: scroll 160s linear infinite;
    }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .machine-box {
      width: 420px; height: 260px; margin-right: 25px; border-radius: 15px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      font-size: 28px; font-weight: bold;
    }
    .footer {
      padding: 10px 30px; background: #1f1f1f; font-size: 14px; color: #777;
      display: flex; justify-content: space-between;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <div id="clock">00:00:00</div>
      <div id="date">Thursday, April 16, 2026</div>
    </div>
    <div id="weather" class="weather-container">Loading weather...</div>
  </div>

  <!-- Ticker -->
  <div class="ticker-container">
    <div id="ticker" class="ticker"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div>5S Status Dashboard • Rock Valley, IA</div>
    <div id="last-refresh">Last refreshed: Just now</div>
  </div>

  <script>
    const MACHINES = ["111","112","121","128","130","131","135","140","141","142","143","144","145","150","151","160","161",
                      "113","117","118","120","122","123","124","126","303","310", "402"];

    // Clock
    function updateClock() {
      const now = new Date();
      const opt = { timeZone: "America/Chicago" };
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {...opt, hour:'2-digit', minute:'2-digit', second:'2-digit'});
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', {...opt, weekday:'long', month:'long', day:'numeric', year:'numeric'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Simple weather fallback (Tomorrow.io)
    async function loadWeather() {
      const container = document.getElementById('weather');
      try {
        const res = await fetch("https://api.tomorrow.io/v4/weather/forecast?location=43.205259,-96.295026&apikey=IO8xwOB75A2It6OX3QXan6Qwk7WROyeK&units=imperial");
        const data = await res.json();
        container.innerHTML = '';
        const daily = data.timelines?.daily || [];
        for (let i = 0; i < Math.min(4, daily.length); i++) {
          const v = daily[i].values;
          const dayName = i === 0 ? "Today" : new Date(daily[i].time).toLocaleDateString('en-US', {weekday:'short'});
          const max = Math.round(v.temperatureMax || v.temperatureAvg);
          const min = Math.round(v.temperatureMin || v.temperatureAvg);
          const pop = Math.round(v.precipitationProbabilityMax || 0);
          let icon = "☀️";
          if (v.weatherCodeMax >= 4000) icon = "🌧️";
          if (v.weatherCodeMax >= 5000) icon = "❄️";
          const card = document.createElement('div');
          card.className = "weather-card";
          card.innerHTML = `<div>${dayName}</div><div style="font-size:42px;margin:8px 0">${icon}</div><div>${max}° / ${min}°</div><div style="font-size:12px;color:#aaa">${pop}% precip</div>`;
          container.appendChild(card);
        }
      } catch(e) {
        container.innerHTML = '<div style="color:#ffcc00">Weather unavailable</div>';
      }
    }
    loadWeather();
    setInterval(loadWeather, 3600000);

    // Simple ticker (no heavy dependencies)
    function buildTicker() {
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = '';
      // Duplicate for seamless loop
      for (let copy = 0; copy < 2; copy++) {
        MACHINES.forEach(mach => {
          const box = document.createElement('div');
          box.className = 'machine-box';
          box.style.backgroundColor = '#4b5563'; // default gray until scores load
          box.innerHTML = `
            <div style="font-size:52px;margin-bottom:8px">${mach}</div>
            <div style="font-size:32px">Loading...</div>
          `;
          ticker.appendChild(box);
        });
      }
    }
    buildTicker();

    // Placeholder for scores (add your loadScores logic here later)
    document.getElementById('last-refresh').textContent = `Last refreshed: ${new Date().toLocaleTimeString('en-US', {timeZone: "America/Chicago"})}`;
  </script>
</body>
</html>
