<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5S Dashboard - Rock Valley</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            max-width: 1920px;
            width: 98vw;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 40px;
            margin-bottom: 20px;
        }
        #clock { font-size: 5.5rem; font-weight: bold; }
        #date { font-size: 2.2rem; opacity: 0.9; }
        .weather-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }
        .ticker-area {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .ticker {
            display: inline-flex;
            white-space: nowrap;
            animation: scroll 200s linear infinite;   /* Very slow for old TV browsers */
        }
        @keyframes scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .machine-box {
            width: 420px;
            height: 220px;
            margin-right: 25px;
            background: #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            font-size: 28px;
        }
        .footer {
            text-align: center;
            font-size: 1.1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Time + Weather -->
        <div class="header">
            <div>
                <div id="clock">00:00:00</div>
                <div id="date">Loading date...</div>
            </div>
            <div id="weather" style="text-align:right;">
                Loading weather...
            </div>
        </div>

        <!-- 5S Ticker -->
        <div class="ticker-area">
            <div id="ticker" class="ticker"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            5S Status Dashboard • Rock Valley, IA • 26 Machines
        </div>
    </div>

    <script>
        // Clock (Central Time)
        function updateClock() {
            const now = new Date();
            const opt = { timeZone: "America/Chicago" };
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { ...opt, hour:'2-digit', minute:'2-digit', second:'2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', { ...opt, weekday:'long', month:'long', day:'numeric', year:'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Simple Weather using your Tomorrow.io key
        async function loadWeather() {
            const container = document.getElementById('weather');
            try {
                const res = await fetch('https://api.tomorrow.io/v4/weather/forecast?location=43.205259,-96.295026&apikey=IO8xwOB75A2It6OX3QXan6Qwk7WROyeK&units=imperial');
                const data = await res.json();
                const daily = data.timelines?.daily || [];
                let html = '<strong>3-Day Forecast</strong><br>';
                for (let i = 0; i < Math.min(3, daily.length); i++) {
                    const v = daily[i].values;
                    const dayName = i === 0 ? "Today" : new Date(daily[i].time).toLocaleDateString('en-US', {weekday:'short'});
                    const max = Math.round(v.temperatureMax || v.temperatureAvg);
                    const min = Math.round(v.temperatureMin || v.temperatureAvg);
                    html += `${dayName}: ${max}° / ${min}°<br>`;
                }
                container.innerHTML = html;
            } catch(e) {
                container.innerHTML = 'Weather unavailable';
            }
        }
        loadWeather();
        setInterval(loadWeather, 3600000);

        // Simple 5S Ticker (placeholder until we connect real scores)
        const machines = ["111","112","121","128","130","131","135","140","141","142","143","144","145","150","151","160","161",
                          "113","117","118","120","122","123","124","126","303","310", "402"];

        function buildTicker() {
            const ticker = document.getElementById('ticker');
            ticker.innerHTML = '';
            for (let copy = 0; copy < 2; copy++) {
                machines.forEach(m => {
                    const box = document.createElement('div');
                    box.className = 'machine-box';
                    box.innerHTML = `
                        <div>${m}</div>
                        <div style="font-size:22px;margin-top:12px">Loading 5S...</div>
                    `;
                    ticker.appendChild(box);
                });
            }
        }
        buildTicker();

        // Last refreshed
        setInterval(() => {
            document.getElementById('footer') ? '' : null; // placeholder
        }, 60000);
    </script>
</body>
</html>
