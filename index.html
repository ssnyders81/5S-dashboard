<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>5S Dashboard - Rock Valley</title>
  <style>
    body {
      margin: 0; padding: 0; background: #111; color: #fff; font-family: Arial, Helvetica, sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: #222; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #444;
    }
    #clock { font-size: 48px; font-weight: bold; }
    #date { font-size: 20px; color: #ccc; }
    .weather { display: flex; gap: 12px; }
    .wcard {
      background: #333; padding: 10px 15px; border-radius: 8px; text-align: center; min-width: 100px; font-size: 15px;
    }
    .ticker-area {
      flex: 1; overflow: hidden; background: #111; padding: 20px 0;
    }
    .ticker {
      display: inline-flex; white-space: nowrap;
      animation: ticker 180s linear infinite;   /* very slow for old browsers */
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .box {
      width: 380px; height: 240px; margin-right: 30px; border-radius: 12px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; box-shadow: 0 6px 15px rgba(0,0,0,0.7); font-size: 26px;
    }
    .footer {
      background: #222; padding: 12px 30px; font-size: 15px; color: #888; display: flex; justify-content: space-between;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div id="clock">00:00:00</div>
      <div id="date">Loading date...</div>
    </div>
    <div id="weather" class="weather">Loading weather...</div>
  </div>

  <div class="ticker-area">
    <div id="ticker" class="ticker"></div>
  </div>

  <div class="footer">
    <div>5S Status • Rock Valley, IA • 26 Machines</div>
    <div id="last-refresh">Last refreshed: Just now</div>
  </div>

  <script>
    // Clock (Central Time)
    function updateClock() {
      const now = new Date();
      const options = { timeZone: "America/Chicago" };
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {...options, hour:'2-digit', minute:'2-digit', second:'2-digit'});
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', {...options, weekday:'long', month:'long', day:'numeric', year:'numeric'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Very basic weather (Tomorrow.io)
    async function loadWeather() {
      const container = document.getElementById('weather');
      try {
        const res = await fetch("https://api.tomorrow.io/v4/weather/forecast?location=43.205259,-96.295026&apikey=IO8xwOB75A2It6OX3QXan6Qwk7WROyeK&units=imperial");
        const data = await res.json();
        const daily = data.timelines?.daily || [];
        container.innerHTML = '';
        for (let i = 0; i < Math.min(4, daily.length); i++) {
          const v = daily[i].values;
          const dayName = i === 0 ? "Today" : new Date(daily[i].time).toLocaleDateString('en-US', {weekday:'short'});
          const max = Math.round(v.temperatureMax || v.temperatureAvg);
          const min = Math.round(v.temperatureMin || v.temperatureAvg);
          let icon = "☀️";
          if (v.weatherCodeMax >= 4000) icon = "🌧️";
          if (v.weatherCodeMax >= 5000) icon = "❄️";
          const card = document.createElement('div');
          card.className = "wcard";
          card.innerHTML = dayName + "<br>" + icon + "<br>" + max + "° / " + min + "°";
          container.appendChild(card);
        }
      } catch(e) {
        container.innerHTML = '<div style="color:#ffaa00">Weather unavailable</div>';
      }
    }
    loadWeather();
    setInterval(loadWeather, 3600000);

    // Ultra-simple ticker (no external dependencies)
    const machines = ["111","112","121","128","130","131","135","140","141","142","143","144","145","150","151","160","161",
                      "113","117","118","120","122","123","124","126","303","310", "402"];

    function buildTicker() {
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = '';
      for (let copy = 0; copy < 2; copy++) {   // duplicate for loop
        machines.forEach(m => {
          const box = document.createElement('div');
          box.className = 'box';
          box.style.backgroundColor = '#555';   // neutral gray until real scores load
          box.innerHTML = `<div style="font-size:48px">${m}</div><div style="font-size:28px;margin-top:10px">Loading...</div>`;
          ticker.appendChild(box);
        });
      }
    }
    buildTicker();

    // Update last refreshed
    document.getElementById('last-refresh').textContent = `Last refreshed: ${new Date().toLocaleTimeString('en-US', {timeZone: "America/Chicago"})}`;
  </script>
</body>
</html>
