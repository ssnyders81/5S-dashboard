<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop 5S Status - Rock Valley</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    
    .ticker-container { overflow: hidden; white-space: nowrap; flex: 1; }
    .ticker {
      display: inline-flex;
      animation: ticker-scroll 110s linear infinite;
    }
    @keyframes ticker-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .machine-box {
      width: 560px; 
      min-width: 560px; 
      height: 340px; 
      margin-right: 32px;
      border-radius: 24px; 
      color: white;
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center;
      box-shadow: 0 10px 20px -4px rgb(0 0 0 / 0.4);
    }

    .weather-card {
      background-color: #1f2937; 
      border-radius: 16px; 
      padding: 16px 12px;
      min-width: 138px; 
      text-align: center;
      box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.3);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white overflow-hidden h-screen flex flex-col">

  <!-- Top Header -->
  <div class="flex justify-between items-start px-10 py-8 bg-zinc-900 border-b border-zinc-700">
    <div>
      <div id="clock" class="text-8xl font-bold tabular-nums tracking-tighter"></div>
      <div id="date" class="text-3xl text-zinc-400 mt-1"></div>
    </div>
    <div id="weather" class="flex gap-6"></div>
  </div>

  <!-- Ticker -->
  <div class="flex-1 flex items-center bg-zinc-950 ticker-container pt-6">
    <div id="ticker" class="ticker"></div>
  </div>

  <!-- Footer -->
  <div class="px-10 py-3 bg-zinc-900 text-xs text-zinc-500 flex justify-between">
    <div>5S Status Dashboard • Rock Valley, IA</div>
    <div id="last-refresh">Last refreshed: Just now</div>
  </div>

  <script>
    // === CONFIG ===
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmZZU6rfXT_5kgqrhlYr29kEWF3QR_YWxokDMJ0cpS-xY3Z389XkXj0a1xrem90xdn/exec";
    const LAT = 43.205;
    const LON = -96.295;
    const MACHINES = ["111","112","121","128","130","131","135","140","141","142","143","144","145","150","151","160","161",
                      "113","117","118","120","122","123","124","126","303","310"];

    function getColor(total) {
      if (total >= 13) return "bg-blue-600";
      if (total >= 10) return "bg-green-500";
      if (total >= 7)  return "bg-orange-500";
      if (total >= 4)  return "bg-yellow-500";
      return "bg-red-600";
    }

    // Clock - no seconds
    function updateClock() {
      const now = new Date();
      const opt = { timeZone: "America/Chicago" };
      document.getElementById('clock').textContent = 
        now.toLocaleTimeString('en-US', { ...opt, hour: '2-digit', minute: '2-digit' });
      
      document.getElementById('date').textContent = 
        now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }
    setInterval(updateClock, 1000); 
    updateClock();

    // Improved Weather with °F and better icons
    async function loadWeather() {
      const container = document.getElementById('weather');
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=America/Chicago&forecast_days=4`);
        const data = await res.json();

        container.innerHTML = '';
        for (let i = 0; i < 4; i++) {
          const dayName = i === 0 ? "Today" : new Date(data.daily.time[i]).toLocaleDateString('en-US', {weekday:'short'});
          
          // Convert Celsius to Fahrenheit
          const maxC = data.daily.temperature_2m_max[i];
          const minC = data.daily.temperature_2m_min[i];
          const maxF = Math.round(maxC * 9/5 + 32);
          const minF = Math.round(minC * 9/5 + 32);

          const code = data.daily.weather_code[i];
          let icon = "☀️";
          if ([61,63,65,80,81,82,95,96,99].includes(code)) icon = "🌧️";
          else if ([71,73,75,77,85,86].includes(code)) icon = "❄️";
          else if ([3,45,48,51,53,55,61,63,65].includes(code)) icon = "☁️";   // mainly cloudy / overcast
          else if ([1,2].includes(code)) icon = "⛅";                         // partly cloudy

          const card = document.createElement('div');
          card.className = "weather-card text-sm";
          card.innerHTML = `
            <div class="font-medium text-zinc-300">${dayName}</div>
            <div class="text-6xl my-4">${icon}</div>
            <div class="text-2xl font-semibold">${maxF}° <span class="text-zinc-400 font-normal">/ ${minF}°</span></div>
          `;
          container.appendChild(card);
        }
      } catch (e) { 
        console.error(e);
        container.innerHTML = '<div class="text-amber-400 px-6">Weather unavailable</div>'; 
      }
    }
    loadWeather();
    setInterval(loadWeather, 3600000);   // every hour

    // Load scores (unchanged from previous version)
    async function loadScores() {
      const tickerEl = document.getElementById('ticker');
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("YOUR_APPS_SCRIPT_URL_HERE")) {
        tickerEl.innerHTML = `<div class="mx-auto text-3xl text-red-400 text-center">Please paste your Apps Script URL</div>`;
        return;
      }

      try {
        const res = await fetch(APPS_SCRIPT_URL);
        const rows = await res.json();

        if (rows.error) {
          tickerEl.innerHTML = `<div class="mx-auto text-3xl text-red-400">${rows.error}</div>`;
          return;
        }

        const latest = {};
        rows.forEach(row => {
          if (!row.MachineNumber) return;
          const mach = String(row.MachineNumber).trim();
          const ts = new Date(row.Timestamp || 0);
          const floor = parseInt(row.Floor) || 0;
          const bench = parseInt(row.Bench) || 0;
          const machine = parseInt(row.Machine) || 0;
          const total = floor + bench + machine;

          if (!latest[mach] || ts > new Date(latest[mach].timestamp || 0)) {
            latest[mach] = {floor, bench, machine, total, timestamp: row.Timestamp};
          }
        });

        tickerEl.innerHTML = '';
        for (let copy = 0; copy < 2; copy++) {
          MACHINES.forEach(mach => {
            const s = latest[mach] || {floor:0, bench:0, machine:0, total:0};
            const total = s.total || 0;
            const colorClass = getColor(total);
            
            const box = document.createElement('div');
            box.className = `machine-box ${colorClass}`;
            box.innerHTML = `
              <div class="text-8xl font-bold mb-4">${mach}</div>
              <div class="text-6xl font-semibold mb-10">${total}/15</div>
              <div class="grid grid-cols-3 gap-x-10 text-lg w-full px-12">
                <div>Floor<br><span class="text-4xl">${s.floor}</span></div>
                <div>Bench<br><span class="text-4xl">${s.bench}</span></div>
                <div>Machine<br><span class="text-4xl">${s.machine}</span></div>
              </div>
            `;
            tickerEl.appendChild(box);
          });
        }
        document.getElementById('last-refresh').textContent = `Last refreshed: ${new Date().toLocaleTimeString('en-US', {timeZone: "America/Chicago"})}`;
      } catch (e) {
        console.error(e);
        tickerEl.innerHTML = `<div class="mx-auto text-3xl text-red-400">Error loading data.<br>Check Apps Script URL and deployment.</div>`;
      }
    }

    loadScores();
    setInterval(loadScores, 60000);
  </script>
</body>
</html>
