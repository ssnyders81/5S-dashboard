<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>5S Dashboard - Rock Valley</title>
  <style>
    body { margin:0; padding:0; background:#111; color:white; font-family:Arial; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    .header { background:#222; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; }
    #clock { font-size:60px; font-weight:bold; }
    .ticker-area { flex:1; overflow:hidden; padding:30px 0; background:#111; }
    .ticker { display:inline-flex; white-space:nowrap; animation:scroll 160s linear infinite; }
    @keyframes scroll { 0% {transform:translateX(0);} 100% {transform:translateX(-50%);} }
    .box { 
      width:420px; height:240px; margin-right:30px; border-radius:15px; 
      display:flex; flex-direction:column; justify-content:center; align-items:center; 
      font-size:42px; box-shadow:0 10px 20px rgba(0,0,0,0.6);
    }
    .footer { background:#222; padding:12px 40px; font-size:15px; color:#aaa; display:flex; justify-content:space-between; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div id="clock">00:00:00</div>
      <div id="date">Loading date...</div>
    </div>
    <div id="weather">Weather loading...</div>
  </div>

  <div class="ticker-area">
    <div id="ticker" class="ticker"></div>
  </div>

  <div class="footer">
    <div>5S Status • Rock Valley, IA • 26 Machines</div>
    <div id="last-refresh">Last refreshed: Just now</div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/YOUR_APPS_SCRIPT_URL_HERE/exec";   // ← PASTE YOUR CURRENT APPS SCRIPT URL HERE

    const MACHINES = ["111","112","121","128","130","131","135","140","141","142","143","144","145","150","151","160","161",
                      "113","117","118","120","122","123","124","126","303","310", "402"];

    // Clock
    function updateClock() {
      const now = new Date();
      const opt = { timeZone: "America/Chicago" };
      document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {...opt, hour:'2-digit', minute:'2-digit', second:'2-digit'});
      document.getElementById('date').textContent = now.toLocaleDateString('en-US', {...opt, weekday:'long', month:'long', day:'numeric', year:'numeric'});
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Weather (your Tomorrow.io)
    async function loadWeather() {
      const container = document.getElementById('weather');
      try {
        const res = await fetch('https://api.tomorrow.io/v4/weather/forecast?location=43.205259,-96.295026&apikey=IO8xwOB75A2It6OX3QXan6Qwk7WROyeK&units=imperial');
        const data = await res.json();
        const daily = data.timelines?.daily || [];
        let html = '';
        for (let i = 0; i < Math.min(3, daily.length); i++) {
          const v = daily[i].values;
          const dayName = i === 0 ? "Today" : new Date(daily[i].time).toLocaleDateString('en-US', {weekday:'short'});
          const max = Math.round(v.temperatureMax || v.temperatureAvg);
          const min = Math.round(v.temperatureMin || v.temperatureAvg);
          html += `${dayName}: ${max}°/${min}°<br>`;
        }
        container.innerHTML = html;
      } catch(e) {
        container.innerHTML = 'Weather unavailable';
      }
    }
    loadWeather();
    setInterval(loadWeather, 3600000);

    // Load 5S Scores from Apps Script
    async function loadScores() {
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = '';

      try {
        const res = await fetch(APPS_SCRIPT_URL);
        if (!res.ok) throw new Error('Network response not ok');
        
        const rows = await res.json();
        
        const latest = {};
        rows.forEach(row => {
          if (!row.MachineNumber) return;
          const mach = String(row.MachineNumber).trim();
          const ts = new Date(row.Timestamp || 0);
          const floor = parseInt(row.Floor) || 0;
          const bench = parseInt(row.Bench) || 0;
          const machine = parseInt(row.Machine) || 0;
          const total = floor + bench + machine;

          if (!latest[mach] || ts > new Date(latest[mach].timestamp || 0)) {
            latest[mach] = {floor, bench, machine, total};
          }
        });

        // Build the ticker with real scores
        for (let copy = 0; copy < 2; copy++) {
          MACHINES.forEach(mach => {
            const s = latest[mach] || {floor:0, bench:0, machine:0, total:0};
            const total = s.total || 0;
            
            let color = '#555';
            if (total >= 13) color = '#2563eb';
            else if (total >= 10) color = '#16a34a';
            else if (total >= 7) color = '#ea580c';
            else if (total >= 4) color = '#eab308';
            else color = '#dc2626';

            const box = document.createElement('div');
            box.className = 'box';
            box.style.backgroundColor = color;
            box.innerHTML = `
              <div style="font-size:52px">${mach}</div>
              <div style="font-size:32px;margin-top:8px">${total}/15</div>
            `;
            ticker.appendChild(box);
          });
        }
        document.getElementById('last-refresh').textContent = `Last refreshed: ${new Date().toLocaleTimeString('en-US', {timeZone: "America/Chicago"})}`;
      } catch (e) {
        console.error("Score load error:", e);
        // Fallback boxes if fetch fails
        for (let copy = 0; copy < 2; copy++) {
          MACHINES.forEach(mach => {
            const box = document.createElement('div');
            box.className = 'box';
            box.style.backgroundColor = '#555';
            box.innerHTML = mach + '<br><span style="font-size:20px">No score</span>';
            ticker.appendChild(box);
          });
        }
      }
    }

    loadScores();
    setInterval(loadScores, 60000);   // Refresh scores every minute
  </script>
</body>
</html>
